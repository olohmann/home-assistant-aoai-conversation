name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test:
    name: Ruff & pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install system dependencies
        # Native libraries required to import the Home Assistant integrations
        # this component depends on (camera/turbojpeg, ffmpeg for tts/stt).
        # Ubuntu 24.04 (noble) ships the TurboJPEG runtime as `libturbojpeg`;
        # older releases used `libturbojpeg0`.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          sudo apt-get install -y --no-install-recommends libturbojpeg \
            || sudo apt-get install -y --no-install-recommends libturbojpeg0

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check custom_components tests scripts

      - name: Ruff lint
        run: uv run ruff check custom_components tests scripts

      - name: Pytest
        run: uv run pytest
